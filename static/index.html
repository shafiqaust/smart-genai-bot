<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart GenAI Bot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h1>Smart GenAI Bot</h1>
            <p>Citation-aware document Q&A</p>
        </header>

        <div id="chat-messages">
            <div class="message bot">
                <div class="message-content">
                    Hello! Ask me anything about the loaded documents. I'll provide answers with source citations.
                </div>
            </div>
        </div>

        <div id="typing-indicator">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <form id="chat-form">
            <input
                type="text"
                id="message-input"
                placeholder="Ask a question..."
                autocomplete="off"
                required
            >
            <button type="submit" id="send-button">Send</button>
        </form>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
