<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart GenAI Bot — Citation-Aware RAG Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
      </svg>
    </div>
    <div class="header-info">
      <h1>Smart GenAI Bot</h1>
      <p>Citation-aware RAG &mdash; answers strictly from your documents</p>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="clearBtn" title="Clear chat">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Chat Messages -->
  <div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg width="34" height="34" fill="none" viewBox="0 0 24 24" stroke="#2563eb" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m5.231 13.481L15 17.25m-4.5-15H5.625c-.621 0-1.125.504-1.125 1.125v16.5c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9zm3.75 11.625a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/>
        </svg>
      </div>
      <h2>Ask about your documents</h2>
      <p>
        This bot answers questions using only the documents loaded in the system.
        Every answer includes inline citations and source references.
      </p>
      <div class="suggestions">
        <button class="suggestion" onclick="useSuggestion(this)">Summarize the key findings</button>
        <button class="suggestion" onclick="useSuggestion(this)">What are the main topics covered?</button>
        <button class="suggestion" onclick="useSuggestion(this)">List all recommendations</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper">
      <div class="input-field-wrapper">
        <textarea
          id="messageInput"
          placeholder="Ask a question about your documents..."
          rows="1"
          autofocus
        ></textarea>
      </div>
      <button class="send-btn" id="sendBtn" title="Send message">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Press Enter to send &middot; Shift+Enter for new line</p>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
