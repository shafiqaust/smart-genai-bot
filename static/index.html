<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart GenAI Bot — Citation-Aware RAG Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f8fa;
      --surface: #ffffff;
      --surface-hover: #f0f2f5;
      --border: #e2e5ea;
      --text: #1a1d23;
      --text-secondary: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-light: #eff6ff;
      --user-bubble: #2563eb;
      --user-text: #ffffff;
      --bot-bubble: #ffffff;
      --bot-text: #1a1d23;
      --citation: #7c3aed;
      --citation-bg: #f5f3ff;
      --source-bg: #f0fdf4;
      --source-border: #bbf7d0;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-text: #991b1b;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
      --radius: 12px;
      --radius-lg: 16px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.3;
    }

    .header-info p {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.3;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: all 0.15s;
    }

    .btn-icon:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    /* Chat Area */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 60px 20px;
      max-width: 520px;
      margin: auto;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      background: var(--primary-light);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 20px;
    }

    .welcome h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .suggestion {
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }

    .suggestion:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    /* Messages */
    .message {
      display: flex;
      gap: 12px;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.bot .message-avatar {
      background: var(--primary-light);
      color: var(--primary);
    }

    .message.user .message-avatar {
      background: var(--user-bubble);
      color: var(--user-text);
    }

    .message-content {
      max-width: 85%;
    }

    .message.user .message-content {
      text-align: right;
    }

    .message-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      word-wrap: break-word;
    }

    .message.user .message-bubble {
      background: var(--user-bubble);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .message.bot .message-bubble {
      background: var(--bot-bubble);
      color: var(--bot-text);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }

    /* Citation markers */
    .citation-marker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--citation-bg);
      color: var(--citation);
      font-size: 11px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      margin: 0 1px;
      cursor: default;
      vertical-align: middle;
    }

    /* Sources block */
    .sources-block {
      margin-top: 12px;
      padding: 12px 16px;
      background: var(--source-bg);
      border: 1px solid var(--source-border);
      border-radius: var(--radius);
      font-size: 13px;
    }

    .sources-block-title {
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #166534;
      margin-bottom: 6px;
    }

    .source-item {
      color: #15803d;
      padding: 2px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .source-item::before {
      content: "📄";
      font-size: 12px;
    }

    /* Error message */
    .error-bubble {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.5;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 16px 20px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: #c4c9d4;
      border-radius: 50%;
      animation: typing 1.4s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input Area */
    .input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      flex-shrink: 0;
    }

    .input-wrapper {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-field-wrapper {
      flex: 1;
      position: relative;
    }

    #messageInput {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
      min-height: 46px;
      max-height: 150px;
      background: var(--bg);
    }

    #messageInput:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    #messageInput::placeholder {
      color: #9ca3af;
    }

    .send-btn {
      width: 46px;
      height: 46px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--primary-hover);
      transform: scale(1.03);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 20px;
      height: 20px;
    }

    .input-hint {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 6px;
      text-align: center;
    }

    /* Scrollbar */
    .chat-container::-webkit-scrollbar {
      width: 6px;
    }

    .chat-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-container::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }

    .chat-container::-webkit-scrollbar-thumb:hover {
      background: #9ca3af;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .header { padding: 12px 16px; }
      .chat-container { padding: 16px; }
      .input-area { padding: 12px 16px; }
      .welcome { padding: 40px 16px; }
      .message-content { max-width: 90%; }
      .suggestions { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
      </svg>
    </div>
    <div class="header-info">
      <h1>Smart GenAI Bot</h1>
      <p>Citation-aware RAG &mdash; answers strictly from your documents</p>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="clearBtn" title="Clear chat">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Chat Messages -->
  <div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg width="34" height="34" fill="none" viewBox="0 0 24 24" stroke="#2563eb" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m5.231 13.481L15 17.25m-4.5-15H5.625c-.621 0-1.125.504-1.125 1.125v16.5c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9zm3.75 11.625a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/>
        </svg>
      </div>
      <h2>Ask about your documents</h2>
      <p>
        This bot answers questions using only the documents loaded in the system.
        Every answer includes inline citations and source references.
      </p>
      <div class="suggestions">
        <button class="suggestion" onclick="useSuggestion(this)">Summarize the key findings</button>
        <button class="suggestion" onclick="useSuggestion(this)">What are the main topics covered?</button>
        <button class="suggestion" onclick="useSuggestion(this)">List all recommendations</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper">
      <div class="input-field-wrapper">
        <textarea
          id="messageInput"
          placeholder="Ask a question about your documents..."
          rows="1"
          autofocus
        ></textarea>
      </div>
      <button class="send-btn" id="sendBtn" title="Send message">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Press Enter to send &middot; Shift+Enter for new line</p>
  </div>

  <script>
    const API_URL = "http://127.0.0.1:8000/chat";

    const chatContainer = document.getElementById("chatContainer");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const welcome = document.getElementById("welcome");

    let isLoading = false;

    // Auto-resize textarea
    messageInput.addEventListener("input", () => {
      messageInput.style.height = "auto";
      messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + "px";
    });

    // Enter to send, Shift+Enter for newline
    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener("click", sendMessage);

    clearBtn.addEventListener("click", () => {
      chatContainer.innerHTML = "";
      chatContainer.appendChild(welcome);
      welcome.style.display = "block";
    });

    function useSuggestion(btn) {
      messageInput.value = btn.textContent;
      sendMessage();
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || isLoading) return;

      // Hide welcome
      welcome.style.display = "none";

      // Add user message
      appendMessage("user", text);
      messageInput.value = "";
      messageInput.style.height = "auto";

      // Show typing indicator
      const typingEl = showTyping();
      isLoading = true;
      sendBtn.disabled = true;

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });

        if (!res.ok) {
          throw new Error(`Server responded with ${res.status}: ${res.statusText}`);
        }

        const data = await res.json();
        removeTyping(typingEl);

        const formatted = formatResponse(data.response);
        appendBotMessage(formatted);
      } catch (err) {
        removeTyping(typingEl);
        appendError(err.message);
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    function appendMessage(role, text) {
      const msg = document.createElement("div");
      msg.className = `message ${role}`;

      const avatar = document.createElement("div");
      avatar.className = "message-avatar";
      avatar.textContent = role === "user" ? "You" : "AI";

      const content = document.createElement("div");
      content.className = "message-content";

      const bubble = document.createElement("div");
      bubble.className = "message-bubble";
      bubble.textContent = text;

      content.appendChild(bubble);
      msg.appendChild(avatar);
      msg.appendChild(content);
      chatContainer.appendChild(msg);
      scrollToBottom();
    }

    function appendBotMessage(formatted) {
      const msg = document.createElement("div");
      msg.className = "message bot";

      const avatar = document.createElement("div");
      avatar.className = "message-avatar";
      avatar.textContent = "AI";

      const content = document.createElement("div");
      content.className = "message-content";

      const bubble = document.createElement("div");
      bubble.className = "message-bubble";
      bubble.innerHTML = formatted.answer;

      content.appendChild(bubble);

      if (formatted.sources.length > 0) {
        const sourcesDiv = document.createElement("div");
        sourcesDiv.className = "sources-block";
        sourcesDiv.innerHTML =
          `<div class="sources-block-title">Sources</div>` +
          formatted.sources
            .map((s) => `<div class="source-item">${escapeHtml(s)}</div>`)
            .join("");
        content.appendChild(sourcesDiv);
      }

      msg.appendChild(avatar);
      msg.appendChild(content);
      chatContainer.appendChild(msg);
      scrollToBottom();
    }

    function appendError(errMsg) {
      const msg = document.createElement("div");
      msg.className = "message bot";

      const avatar = document.createElement("div");
      avatar.className = "message-avatar";
      avatar.textContent = "AI";

      const content = document.createElement("div");
      content.className = "message-content";

      const bubble = document.createElement("div");
      bubble.className = "error-bubble";
      bubble.innerHTML = `<strong>Error:</strong> ${escapeHtml(errMsg)}<br><span style="font-size:12px;color:#6b7280;margin-top:4px;display:inline-block;">Make sure the backend is running on <code>http://127.0.0.1:8000</code></span>`;

      content.appendChild(bubble);
      msg.appendChild(avatar);
      msg.appendChild(content);
      chatContainer.appendChild(msg);
      scrollToBottom();
    }

    function showTyping() {
      const msg = document.createElement("div");
      msg.className = "message bot";
      msg.id = "typing";

      const avatar = document.createElement("div");
      avatar.className = "message-avatar";
      avatar.textContent = "AI";

      const content = document.createElement("div");
      content.className = "message-content";

      const bubble = document.createElement("div");
      bubble.className = "message-bubble";
      bubble.innerHTML = `
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>`;

      content.appendChild(bubble);
      msg.appendChild(avatar);
      msg.appendChild(content);
      chatContainer.appendChild(msg);
      scrollToBottom();
      return msg;
    }

    function removeTyping(el) {
      if (el && el.parentNode) el.parentNode.removeChild(el);
    }

    /**
     * Parse the response string into answer HTML + sources array.
     * The backend returns text like:
     *   "Answer text [1] more text [2]...\n\nSources:\n[1] file.pdf\n[2] other.txt"
     */
    function formatResponse(raw) {
      let answer = raw;
      const sources = [];

      // Split on "Sources:" section
      const sourceSplit = raw.split(/\n\s*Sources:\s*\n/i);
      if (sourceSplit.length > 1) {
        answer = sourceSplit[0].trim();
        const sourceLines = sourceSplit[1].trim().split("\n");
        for (const line of sourceLines) {
          const cleaned = line.replace(/^\[\d+\]\s*/, "").trim();
          if (cleaned) sources.push(cleaned);
        }
      }

      // Escape HTML first, then style citation markers
      answer = escapeHtml(answer);
      answer = answer.replace(
        /\[(\d+)\]/g,
        '<span class="citation-marker">$1</span>'
      );

      // Convert newlines to <br>
      answer = answer.replace(/\n/g, "<br>");

      return { answer, sources };
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        chatContainer.scrollTop = chatContainer.scrollHeight;
      });
    }
  </script>
</body>
</html>
